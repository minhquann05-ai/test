<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Trắc Nghiệm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .question-card {
            transition: all 0.3s ease;
        }
        
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen pb-12">
    <div class="max-w-4xl mx-auto px-4 py-8">
        
        <!-- HEADER -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl">📚</div>
                <div>
                    <h1 class="text-3xl font-bold text-slate-800">Ôn Tập Trắc Nghiệm</h1>
                    <p class="text-slate-500">Tất cả câu hỏi trên một trang • Đảo cả câu hỏi & đáp án</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="resetToOriginalOrder()" 
                        class="flex items-center gap-2 px-6 py-3 bg-white hover:bg-slate-100 border border-slate-200 rounded-2xl font-medium text-slate-700 transition-all">
                    🔄 Thứ tự gốc
                </button>
                
                <button onclick="restartWithShuffle()" 
                        class="flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium transition-all">
                    🔀 Làm lại (đảo hết)
                </button>
            </div>
        </div>

        <!-- Progress -->
        <div class="sticky top-0 bg-white/95 backdrop-blur-md z-50 border-b mb-6 py-4 px-6 rounded-3xl shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div>
                    <span class="text-slate-500 text-sm">Đã trả lời</span>
                    <span id="answered-count" class="text-3xl font-bold text-slate-800">0</span>
                    <span class="text-slate-400"> / </span>
                    <span id="total-count" class="text-slate-500"></span>
                </div>
                <div class="h-8 w-px bg-slate-200"></div>
                <div>
                    <span class="text-emerald-500">Điểm</span>
                    <span id="score-display" class="text-3xl font-bold text-emerald-600 ml-2">0</span>
                </div>
            </div>
            <button onclick="submitQuiz()" 
                    class="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-2xl shadow-lg transition-all active:scale-95">
                📤 Nộp bài & Xem kết quả
            </button>
        </div>

        <!-- DANH SÁCH CÂU HỎI -->
        <div id="questions-container" class="space-y-8">
            <!-- JS render ở đây -->
        </div>

    </div>

    <script>
        // ====================== DỮ LIỆU CÂU HỎI (bạn tự thêm ở đây) ======================
        let originalQuestions = [
    {
        question: "Câu 1. Hai GPIO đều cấu hình output, một HIGH và một LOW nối trực tiếp với nhau sẽ gây hiện tượng gì?",
        options: [
            "A. Không có gì xảy ra vì hai chân output cân bằng điện áp",
            "B. Dòng điện lớn chảy qua cả hai chân GPIO, có thể gây hỏng chân hoặc chip",
            "C. Điện áp đo được sẽ là 2.5V",
            "D. Tạo ra tín hiệu PWM tự động"
        ],
        correctIndex: 1,
        explanation: "Hai chân output đều drive mạnh (một push HIGH, một push LOW) → tạo thành short-circuit trực tiếp giữa Vcc và GND qua hai transistor output. Dòng điện lớn (có thể vài chục mA đến trăm mA) chảy qua, dễ gây quá nhiệt và hỏng chân GPIO hoặc toàn bộ vi điều khiển."
    },
    {
        question: "Câu 2. Floating input thường gây ra hậu quả nào trong hệ thống số?",
        options: [
            "A. Input luôn đọc được mức LOW ổn định",
            "B. Input đọc giá trị ngẫu nhiên, dễ gây nhiễu và hoạt động không ổn định",
            "C. Tăng tiêu thụ dòng của chip",
            "D. Tự động chuyển sang chế độ High-Z"
        ],
        correctIndex: 1,
        explanation: "Chân input floating (không được kéo lên/kéo xuống) không có điện áp tham chiếu cố định. Nhiễu điện từ, điện dung ký sinh hoặc điện trường xung quanh sẽ làm điện áp trên chân dao động ngẫu nhiên → vi điều khiển đọc được 0 hoặc 1 một cách không xác định, dẫn đến lỗi logic, reset không mong muốn hoặc hoạt động không ổn định."
    },
    {
        question: "Câu 3. ADC 10-bit với V_ref = 5V có độ phân giải gần đúng bao nhiêu?",
        options: [
            "A. 5 mV",
            "B. 4.88 mV",
            "C. 10 mV",
            "D. 2.5 mV"
        ],
        correctIndex: 1,
        explanation: "Độ phân giải của ADC = V_ref / 2^10 = 5 / 1024 ≈ 0.0048828 V ≈ 4.88 mV. Mỗi bước nhảy của ADC tương ứng với 4.88 mV."
    },
    {
        question: "Câu 4. PWM duty cycle 20% ở mức 5V tạo ra điện áp trung bình gần đúng bao nhiêu?",
        options: [
            "A. 2V",
            "B. 1V",
            "C. 4V",
            "D. 0.2V"
        ],
        correctIndex: 1,
        explanation: "Điện áp trung bình của PWM = Duty cycle × Vpeak = 0.2 × 5 V = 1 V. Đây là giá trị DC tương đương mà một bộ lọc RC sẽ đo được."
    },
    {
        question: "Câu 5. Sampling thấp hơn định lý Nyquist sẽ gây ra hiện tượng gì?",
        options: [
            "A. Tín hiệu bị mất hoàn toàn",
            "B. Hiện tượng aliasing (tín hiệu tần số cao giả dạng thành tần số thấp)",
            "C. Tăng độ chính xác của ADC",
            "D. Không ảnh hưởng gì đến tín hiệu"
        ],
        correctIndex: 1,
        explanation: "Định lý Nyquist yêu cầu tần số lấy mẫu fs ≥ 2 × fmax. Nếu fs < 2fmax, các tần số cao sẽ bị gập xuống (alias) thành tần số thấp giả, gây méo tín hiệu không thể khôi phục."
    },
    {
        question: "Câu 6. Trạng thái High-Z chủ yếu được sử dụng để giải quyết vấn đề nào?",
        options: [
            "A. Tiết kiệm điện năng",
            "B. Tránh xung đột bus (bus contention) khi nhiều thiết bị nối chung một đường dữ liệu",
            "C. Tăng tốc độ truyền dữ liệu",
            "D. Tạo ra tín hiệu analog"
        ],
        correctIndex: 1,
        explanation: "High-Z (tri-state) làm chân GPIO như “không nối” (điện trở rất cao), cho phép thiết bị khác drive bus mà không bị xung đột điện. Đây là nguyên tắc cốt lõi của bus đa thiết bị (I2C, SPI, UART shared, v.v.)."
    },
    {
        question: "Câu 7. ADC 10-bit đọc giá trị 768 với V_ref = 5V thì điện áp đầu vào gần đúng là bao nhiêu?",
        options: [
            "A. 3V",
            "B. 3.75V",
            "C. 4V",
            "D. 2.5V"
        ],
        correctIndex: 1,
        explanation: "Điện áp = (Giá trị ADC / 1024) × V_ref = (768 / 1024) × 5 = 0.75 × 5 = 3.75 V."
    },
    {
        question: "Câu 8. Breadboard thường không phù hợp với loại ứng dụng nào?",
        options: [
            "A. Prototype mạch đơn giản, tần số thấp",
            "B. Mạch tần số cao (RF, >10 MHz) hoặc tốc độ cao",
            "C. Kiểm tra logic cơ bản",
            "D. Học lập trình nhúng"
        ],
        correctIndex: 1,
        explanation: "Breadboard có độ dài dây dẫn dài, điện dung và điện cảm ký sinh lớn, tiếp xúc không ổn định → gây nhiễu nghiêm trọng ở tần số cao, làm méo tín hiệu clock, RF, hoặc các giao thức tốc độ cao (USB, Ethernet, SPI >20 MHz…)."
    },
    {
        question: "Câu 9. Một GPIO output đang ở mức HIGH (5V). Nếu nối trực tiếp với một GPIO khác cấu hình output LOW, điều gì xảy ra?",
        options: [
            "A. Điện áp đo được giữa hai chân là 0V",
            "B. Xảy ra short-circuit, dòng điện lớn chảy qua hai chân GPIO",
            "C. Hai chân tự động chuyển sang High-Z",
            "D. Vi điều khiển tự reset an toàn"
        ],
        correctIndex: 1,
        explanation: "Hai output push-pull drive ngược nhau (HIGH vs LOW) → tạo short-circuit trực tiếp, dòng điện rất lớn, dễ gây hỏng chân GPIO hoặc chip (giống Câu 1)."
    },
    {
        question: "Câu 10. Một chân input ở trạng thái floating có thể gây hiện tượng gì trong hệ thống số?",
        options: [
            "A. Input luôn đọc được mức HIGH ổn định",
            "B. Input đọc giá trị ngẫu nhiên, gây nhiễu và hoạt động không xác định",
            "C. Tiêu thụ dòng rất thấp",
            "D. Tự động kéo xuống GND"
        ],
        correctIndex: 1,
        explanation: "Chân floating không có điện trở kéo lên/kéo xuống → điện áp bị nhiễu từ môi trường (điện trường, tiếp xúc tay, điện dung ký sinh) làm thay đổi ngẫu nhiên giữa 0 và 1, dẫn đến chương trình chạy sai hoặc hoạt động không ổn định (giống Câu 2)."
    },
    {
        question: "Câu 11. Một LED cần 20mA, nguồn 5V, LED rơi áp 2V. Giá trị điện trở phù hợp nhất là bao nhiêu?",
        options: [
            "100Ω",
            "150Ω",
            "220Ω",
            "330Ω"
        ],
        correctIndex: 1,
        explanation: "Điện áp rơi trên điện trở là VR = 5V - 2V = 3V. Dòng điện qua LED là 20mA = 0.02A. Áp dụng công thức Ohm: R = VR / I = 3 / 0.02 = 150Ω. Giá trị này đảm bảo LED sáng ở dòng định mức mà không bị cháy hoặc quá mờ."
    },
    {
        question: "Câu 12. Nếu dùng điện trở 100Ω cho LED 5V có điện áp rơi 2V, dòng điện qua LED xấp xỉ bao nhiêu?",
        options: [
            "10mA",
            "20mA",
            "30mA",
            "50mA"
        ],
        correctIndex: 2,
        explanation: "Điện áp rơi trên điện trở là VR = 5V - 2V = 3V. Dòng điện qua LED: I = VR / R = 3 / 100 = 0.03A = 30mA. Lưu ý: 30mA hơi cao hơn dòng định mức thông thường của LED (có thể làm LED nóng hơn nhưng vẫn hoạt động tạm thời)."
    },
    {
        question: "Câu 13. Breadboard không phù hợp nhất với loại ứng dụng nào?",
        options: [
            "Thí nghiệm prototype",
            "Học tập và phát triển nhanh",
            "Mạch tạm thời",
            "Ứng dụng sản xuất hàng loạt, môi trường công nghiệp"
        ],
        correctIndex: 3,
        explanation: "Breadboard chỉ dùng để prototype và thí nghiệm tạm thời vì các chân tiếp xúc lỏng lẻo, dễ bị rung, oxy hóa và tạo nhiễu. Trong sản xuất hàng loạt hoặc môi trường công nghiệp (rung lắc, độ ẩm cao), mạch phải hàn cố định trên PCB để đảm bảo độ tin cậy và ổn định lâu dài."
    },
    {
        question: "Câu 14. Nếu không có điện trở pull-up hoặc pull-down, nút nhấn sẽ gây trạng thái gì tại input?",
        options: [
            "Luôn HIGH",
            "Luôn LOW",
            "Trạng thái không xác định (floating)",
            "Ngắn mạch"
        ],
        correctIndex: 2,
        explanation: "Khi không có pull-up/pull-down, chân input của vi điều khiển “floating” (không kết nối với mức logic nào). Nút nhấn mở → input bị nhiễu điện từ, đọc giá trị ngẫu nhiên (có thể HIGH hoặc LOW không ổn định), dẫn đến chương trình chạy sai."
    },
    {
        question: "Câu 15. PWM thường được sử dụng để giải quyết bài toán nào trong hệ thống nhúng?",
        options: [
            "Tăng tốc độ xử lý CPU",
            "Điều khiển analog (điều chỉnh độ sáng LED, tốc độ motor) từ output digital",
            "Chuyển đổi analog sang digital",
            "Lưu trữ dữ liệu"
        ],
        correctIndex: 1,
        explanation: "PWM (Pulse Width Modulation) tạo ra điện áp trung bình tương đương tín hiệu analog từ chân digital. Nó giải quyết bài toán điều khiển công suất (độ sáng LED, tốc độ motor DC, servo…) mà không cần DAC ngoài, rất phổ biến trong Arduino, ESP32, STM32."
    },
    {
        question: "Câu 16. Duty cycle 25% ở mức 5V tạo ra điện áp trung bình xấp xỉ bao nhiêu?",
        options: [
            "1.25V",
            "2.5V",
            "3.75V",
            "5V"
        ],
        correctIndex: 0,
        explanation: "Điện áp trung bình của PWM: Vavg = Duty × Vpeak = 0.25 × 5V = 1.25V. Đây là nguyên lý PWM tạo tín hiệu analog tương đương."
    },
    {
        question: "Câu 17. Với ADC 10-bit và Vref = 5V, độ phân giải điện áp trên mỗi bước là bao nhiêu?",
        options: [
            "0.5V",
            "1mV",
            "Khoảng 4.88mV",
            "10mV"
        ],
        correctIndex: 2,
        explanation: "ADC 10-bit có 1024 mức (0 đến 1023). Độ phân giải: Vref / 2^10 = 5 / 1024 ≈ 4.88mV mỗi bước. Giá trị đọc càng chính xác khi độ phân giải càng nhỏ."
    },
    {
        question: "Câu 18. ADC đọc được giá trị 512 với Vref = 5V thì điện áp input gần đúng là bao nhiêu?",
        options: [
            "1V",
            "2.5V",
            "3V",
            "4V"
        ],
        correctIndex: 1,
        explanation: "Công thức: Vin = (ADCvalue / 1024) × Vref = (512 / 1024) × 5 = 2.5V. Giá trị 512 chính là giữa thang đo (nửa phạm vi)."
    },
    {
        question: "Câu 19. Một cảm biến có sai số ±2% khi đo giá trị 100 đơn vị thì sai số tuyệt đối là bao nhiêu?",
        options: [
            "±0.2",
            "±2",
            "±20",
            "±200"
        ],
        correctIndex: 1,
        explanation: "Sai số tuyệt đối = sai số tương đối × giá trị đo = 2% × 100 = 0.02 × 100 = 2 đơn vị. Do đó sai số là ±2 đơn vị."
    },
    {
        question: "Câu 20. Nếu tần số sampling quá thấp so với tín hiệu thực, hiện tượng nào dễ xảy ra nhất?",
        options: [
            "Over-sampling",
            "Hiện tượng gập tần (aliasing)",
            "Quantization error",
            "Noise cao hơn"
        ],
        correctIndex: 1,
        explanation: "Theo định lý Nyquist, tần số lấy mẫu fs phải ≥ 2 × tần số cao nhất của tín hiệu. Nếu fs quá thấp, tín hiệu cao tần sẽ “gập” thành tần số thấp giả tạo (aliasing), làm méo dạng tín hiệu thu được."
    },
    {
        question: "Câu 21. Tín hiệu digital chuẩn thông thường có bao nhiêu trạng thái logic cơ bản?",
        options: [
            "A. 2",
            "B. 3",
            "C. 4",
            "D. 1"
        ],
        correctIndex: 0,
        explanation: "Tín hiệu digital chuẩn (logic TTL/CMOS) chỉ có 2 trạng thái logic cơ bản là Low (0) và High (1). Trạng thái High-Z là trạng thái thứ 3 nhưng chỉ xuất hiện ở đầu ra tri-state, không phải trạng thái logic cơ bản của tín hiệu."
    },
    {
        question: "Câu 22. Trạng thái High-Z trong bus số có vai trò quan trọng nhất là gì?",
        options: [
            "A. Tăng tốc độ truyền dữ liệu",
            "B. Giảm tiêu thụ điện năng",
            "C. Cho phép nhiều thiết bị chia sẻ bus mà không gây xung đột",
            "D. Tăng khả năng chống nhiễu"
        ],
        correctIndex: 2,
        explanation: "High-Z (high impedance) làm đầu ra của driver “ngắt” khỏi bus (như ngắt mạch), cho phép nhiều thiết bị kết nối chung một bus mà không gây short-circuit khi các thiết bị khác đang truyền. Đây là nguyên lý cốt lõi của bus ba trạng thái (tri-state bus)."
    },
    {
        question: "Câu 23. UART có baud rate 9600bps thì thời gian truyền của 1 bit gần đúng là bao nhiêu?",
        options: [
            "A. 1 ms",
            "B. 104 μs",
            "C. 960 μs",
            "D. 10 μs"
        ],
        correctIndex: 1,
        explanation: "Baud rate 9600 bps nghĩa là truyền 9600 bit/giây → thời gian 1 bit = 1/9600 ≈ 0,000104167 giây = 104,17 μs (gần đúng 104 μs)."
    },
    {
        question: "Câu 24. UART frame gồm 1 start bit, 8 data bit và 1 stop bit sẽ có tổng cộng bao nhiêu bit?",
        options: [
            "A. 8 bit",
            "B. 9 bit",
            "C. 10 bit",
            "D. 11 bit"
        ],
        correctIndex: 2,
        explanation: "Tổng số bit trong frame = 1 start + 8 data + 1 stop = 10 bit (không tính parity bit trong câu hỏi này)."
    },
    {
        question: "Câu 25. Baud rate mismatch trong UART thường gây ra hiện tượng gì?",
        options: [
            "A. Tăng tốc độ truyền",
            "B. Dữ liệu bị nhận sai (garbled data) hoặc framing error",
            "C. Giảm nhiễu",
            "D. Tăng thời gian truyền 1 byte"
        ],
        correctIndex: 1,
        explanation: "Khi baud rate giữa TX và RX khác nhau, thời điểm lấy mẫu bit bị lệch dần → bit start, data, stop bị nhận sai, thường biểu hiện bằng dữ liệu “rác” hoặc lỗi framing."
    },
    {
        question: "Câu 26. RS485 có khả năng chống nhiễu tốt chủ yếu nhờ kỹ thuật nào?",
        options: [
            "A. Tăng điện áp truyền",
            "B. Tín hiệu vi sai (differential signaling)",
            "C. Sử dụng nhiều stop bit",
            "D. Tăng baud rate"
        ],
        correctIndex: 1,
        explanation: "RS485 dùng cặp dây vi sai (A và B), nhiễu lan truyền chung-mode sẽ bị triệt tiêu tại receiver, nên khả năng chống nhiễu rất cao ở khoảng cách xa và môi trường công nghiệp."
    },
    {
        question: "Câu 27. Half-duplex nghĩa là gì trong truyền thông dữ liệu?",
        options: [

        let currentQuestions = []
        let userAnswers = []

        // Hàm đảo mảng
        function shuffle(array) {
            const arr = [...array]
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1))
                ;[arr[i], arr[j]] = [arr[j], arr[i]]
            }
            return arr
        }

        // Hàm đảo thứ tự đáp án của 1 câu hỏi
        function shuffleOptions(question) {
            const indices = [...Array(question.options.length).keys()] // [0,1,2,3]
            const shuffledIndices = shuffle(indices)
            
            const newOptions = shuffledIndices.map(i => question.options[i])
            const newCorrectIndex = shuffledIndices.indexOf(question.correctIndex)
            
            return {
                ...question,
                options: newOptions,
                correctIndex: newCorrectIndex
            }
        }

        // Render tất cả câu hỏi
        function renderAllQuestions() {
            const container = document.getElementById('questions-container')
            container.innerHTML = ''

            currentQuestions.forEach((q, qIndex) => {
                const cardHTML = `
                <div class="question-card bg-white rounded-3xl shadow-lg p-8 border border-slate-100">
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 w-9 h-9 bg-blue-100 text-blue-700 font-bold rounded-2xl flex items-center justify-center text-lg">
                            ${qIndex + 1}
                        </div>
                        <div class="flex-1">
                            <p class="text-2xl font-semibold text-slate-800 leading-tight mb-6">${q.question}</p>
                            
                            <div class="grid grid-cols-1 gap-4" id="options-${qIndex}">
                                ${q.options.map((option, oIndex) => {
                                    const letter = String.fromCharCode(65 + oIndex)
                                    return `
                                    <button onclick="selectAnswer(${qIndex}, ${oIndex})" 
                                            id="btn-${qIndex}-${oIndex}"
                                            class="option-btn w-full text-left flex items-center gap-4 px-6 py-6 bg-white border-2 border-slate-200 hover:border-blue-300 rounded-3xl text-lg font-medium text-slate-700">
                                        <div class="w-8 h-8 flex-shrink-0 bg-slate-100 rounded-2xl flex items-center justify-center font-bold text-blue-600">
                                            ${letter}
                                        </div>
                                        <span class="flex-1">${option}</span>
                                    </button>`
                                }).join('')}
                            </div>

                            <div id="feedback-${qIndex}" class="hidden mt-6 bg-slate-50 border border-slate-200 rounded-2xl p-6">
                                <div id="result-${qIndex}" class="flex items-center gap-3 mb-4"></div>
                                <div id="correct-display-${qIndex}" class="hidden mb-3 text-sm">
                                    <span class="font-medium text-slate-600">Đáp án đúng là: </span>
                                    <span id="correct-text-${qIndex}" class="font-semibold text-emerald-600"></span>
                                </div>
                                <div class="bg-white p-5 rounded-2xl">
                                    <p class="text-slate-600 text-sm font-medium mb-2">💡 GIẢI THÍCH</p>
                                    <p id="explanation-${qIndex}" class="text-slate-700 leading-relaxed"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`

                container.innerHTML += cardHTML
            })

            document.getElementById('total-count').textContent = currentQuestions.length
            updateProgress()
        }

        function selectAnswer(qIndex, selectedIndex) {
            const q = currentQuestions[qIndex]
            userAnswers[qIndex] = selectedIndex

            // Tắt nút
            const optionsContainer = document.getElementById(`options-${qIndex}`)
            const buttons = optionsContainer.querySelectorAll('button')
            buttons.forEach(btn => btn.disabled = true)

            const isCorrect = selectedIndex === q.correctIndex

            if (isCorrect) {
                const correctBtn = document.getElementById(`btn-${qIndex}-${selectedIndex}`)
                correctBtn.classList.add('!border-emerald-500', '!bg-emerald-50', 'text-emerald-700')
            } else {
                const wrongBtn = document.getElementById(`btn-${qIndex}-${selectedIndex}`)
                wrongBtn.classList.add('!border-red-500', '!bg-red-50', 'text-red-700')
                
                const correctBtn = document.getElementById(`btn-${qIndex}-${q.correctIndex}`)
                correctBtn.classList.add('!border-emerald-500', '!bg-emerald-50', 'text-emerald-700')
            }

            showFeedback(qIndex, isCorrect)
            updateProgress()
        }

        function showFeedback(qIndex, isCorrect) {
            const feedbackDiv = document.getElementById(`feedback-${qIndex}`)
            const resultDiv = document.getElementById(`result-${qIndex}`)
            const explanationEl = document.getElementById(`explanation-${qIndex}`)
            const correctDisplay = document.getElementById(`correct-display-${qIndex}`)

            feedbackDiv.classList.remove('hidden')

            const q = currentQuestions[qIndex]

            if (isCorrect) {
                resultDiv.innerHTML = `<div class="text-4xl">🎉</div><div><p class="text-2xl font-bold text-emerald-600">Đúng rồi!</p></div>`
                correctDisplay.classList.add('hidden')
            } else {
                resultDiv.innerHTML = `<div class="text-4xl">😔</div><div><p class="text-2xl font-bold text-red-600">Chưa đúng</p></div>`
                const letter = String.fromCharCode(65 + q.correctIndex)
                document.getElementById(`correct-text-${qIndex}`).innerHTML = `<span class="text-xl">${letter}.</span> ${q.options[q.correctIndex]}`
                correctDisplay.classList.remove('hidden')
            }

            explanationEl.innerHTML = q.explanation
        }

        function updateProgress() {
            const answered = userAnswers.filter(ans => ans !== null && ans !== undefined).length
            const score = userAnswers.reduce((acc, ans, i) => acc + (ans === currentQuestions[i].correctIndex ? 1 : 0), 0)
            document.getElementById('answered-count').textContent = answered
            document.getElementById('score-display').textContent = score
        }

        function submitQuiz() {
            const total = currentQuestions.length
            const correct = userAnswers.reduce((acc, ans, i) => acc + (ans === currentQuestions[i].correctIndex ? 1 : 0), 0)
            const percentage = Math.round((correct / total) * 100)
            alert(`🎯 Nộp bài xong!\n\nBạn đúng ${correct}/${total} câu (${percentage}%)`)
        }

        function startQuiz(isOriginalOrder = false) {
            // Luôn đảo thứ tự đáp án của từng câu
            let questions = originalQuestions.map(q => shuffleOptions(q))

            if (isOriginalOrder) {
                // Chỉ giữ thứ tự câu hỏi gốc, vẫn đảo đáp án
                currentQuestions = questions
            } else {
                // Đảo cả thứ tự câu hỏi + đáp án
                currentQuestions = shuffle(questions)
            }

            userAnswers = new Array(currentQuestions.length).fill(null)
            renderAllQuestions()
        }

        function resetToOriginalOrder() {
            startQuiz(true)
        }

        function restartWithShuffle() {
            startQuiz(false)
        }

        // Khởi động
        window.onload = () => {
            startQuiz(false) // Mặc định đảo hết khi mở trang
        }
    </script>
