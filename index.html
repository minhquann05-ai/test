<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Công Cụ Sinh Số Theo IP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    body { 
      font-family: 'Roboto', sans-serif; 
      background: #f4f7f9; 
      color: #1f2937; 
      margin: 0; 
      padding: 20px; 
    }
    .container { 
      max-width: 920px; 
      margin: 0 auto; 
      background: #ffffff; 
      border-radius: 16px; 
      padding: 40px 30px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
    }
    h1 { 
      text-align: center; 
      font-size: 2.2rem; 
      margin-bottom: 8px; 
      color: #1e40af; 
    }
    .subtitle { 
      text-align: center; 
      font-size: 1.1rem; 
      color: #64748b; 
      margin-bottom: 30px; 
    }
    button { 
      display: block; 
      margin: 20px auto; 
      padding: 14px 36px; 
      font-size: 1.15rem; 
      font-weight: 500; 
      background: #1e40af; 
      color: white; 
      border: none; 
      border-radius: 50px; 
      cursor: pointer; 
      transition: all 0.3s; 
    }
    button:hover { transform: scale(1.04); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result { 
      margin-top: 30px; 
      background: #f8fafc; 
      border-radius: 12px; 
      padding: 30px; 
      border: 1px solid #e2e8f0; 
    }
    .header { 
      text-align: center; 
      font-size: 1.35rem; 
      margin-bottom: 20px; 
      color: #1e40af; 
    }
    .ip-info { 
      text-align: center; 
      background: #e0f2fe; 
      padding: 12px; 
      border-radius: 10px; 
      margin-bottom: 25px; 
      font-size: 1.05rem; 
    }
    .row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin: 18px 0; 
      padding: 12px 18px; 
      background: #fff; 
      border-radius: 10px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
    }
    .row-name { 
      font-weight: 500; 
      font-size: 1.1rem; 
      width: 140px; 
      color: #334155; 
    }
    .row-numbers { 
      font-size: 1.65rem; 
      font-weight: 500; 
      letter-spacing: 6px; 
      color: #1e40af; 
      text-align: right; 
    }
    .status { 
      text-align: center; 
      font-size: 0.95rem; 
      color: #10b981; 
      margin: 15px 0; 
    }
    .note { 
      text-align: center; 
      font-size: 0.95rem; 
      color: #64748b; 
      margin-top: 40px; 
    }
    .copy-btn { 
      background: #10b981; 
      color: white; 
      border: none; 
      padding: 10px 24px; 
      border-radius: 30px; 
      cursor: pointer; 
      font-size: 1rem; 
      margin: 20px auto; 
      display: block; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>IP</h1>
    <p class="subtitle">địa chỉ IP • Đổi VPN</p>
    
    <button id="btnPredict">TẠO</button>
    
    <div id="status" class="status">Đang theo dõi IP tự động (cập nhật mỗi 5 giây)...</div>
    
    <div id="result" class="result" style="display:none;"></div>
    
    <div class="note">
      Mỗi địa chỉ IP.
    </div>
  </div>

  <script>
    let currentIP = null;

    function seededRandom(seed) {
      let x = Math.sin(seed) * 10000;
      return function() {
        x = (x * 9301 + 49297) % 233280;
        return x / 233280;
      };
    }

    async function fetchIP() {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
      } catch (e) {
        return null;
      }
    }

    async function generateAndShow(ip) {
      const today = new Date().toLocaleDateString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh' });
      const dateStr = today.split('/').reverse().join('');

      const seedString = dateStr + ip;
      let seed = 0;
      for (let i = 0; i < seedString.length; i++) {
        seed += seedString.charCodeAt(i) * (i + 1);
      }

      const random = seededRandom(seed);
      const gen = (len) => String(Math.floor(random() * Math.pow(10, len))).padStart(len, '0');

      const data = {
        main: gen(5),
        row1: gen(5),
        row2: [gen(5), gen(5)],
        row3: Array(6).fill().map(() => gen(5)),
        row4: Array(7).fill().map(() => gen(4)),
        row5: gen(4),
        row6: Array(3).fill().map(() => gen(3)),
        row7: Array(4).fill().map(() => gen(2))
      };

      let html = `
        <div class="header">Ngày ${today}</div>
        
        <div class="ip-info">
          📍 IP hiện tại: <strong>${ip}</strong>
        </div>

        <div class="row"><span class="row-name">Chính</span><span class="row-numbers">pmx5ssv5s${data.main}xx98cnsure</span></div>
               
        <button class="copy-btn" onclick="copyResult()">📋 Sao chép</button>
      `;

      document.getElementById('result').innerHTML = html;
      document.getElementById('result').style.display = 'block';
    }

    async function checkAndPredict() {
      const newIP = await fetchIP();
      if (!newIP || newIP === currentIP) return;
      currentIP = newIP;
      await generateAndShow(newIP);
    }

    async function getPrediction() {
      const btn = document.getElementById('btnPredict');
      btn.disabled = true;
      btn.textContent = 'Đang tạo bộ số...';
      await checkAndPredict();
      btn.disabled = false;
      btn.textContent = 'TẠO BỘ SỐ MỚI NGAY';
    }

    function copyResult() {
      const text = document.getElementById('result').innerText;
      navigator.clipboard.writeText(text).then(() => alert('Đã sao chép bộ số!'));
    }

    // Tự động chạy khi mở trang + theo dõi IP
    window.onload = async () => {
      await getPrediction();
      setInterval(checkAndPredict, 3000);
    };

    document.getElementById('btnPredict').addEventListener('click', getPrediction);
  </script>
</body>
</html>
